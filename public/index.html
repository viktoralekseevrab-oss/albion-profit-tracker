<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Albion Profit Tracker v6</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <h2>🍅 Albion Profit Tracker</h2>
            <input type="text" id="username" placeholder="Имя пользователя">
            <input type="password" id="password" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <button onclick="register()">Зарегистрироваться</button>
        </div>
    </div>

    <div class="app-container" id="appContainer" style="display:none;">
        <div class="sidebar">
            <div class="city-selector">
                <select id="globalCitySelect" onchange="changeGlobalCity(this.value)"></select>
            </div>
            <div class="tab-buttons">
                <button id="tabDashboardBtn" class="tab-btn active" onclick="switchTab('dashboard')">📊 Обзор</button>
                <button id="tabItemsBtn" class="tab-btn" onclick="switchTab('items')">📦 Товары</button>
                <button id="tabLotsBtn" class="tab-btn" onclick="switchTab('lots')">📈 Сделки</button>
                <button id="tabResourcesBtn" class="tab-btn" onclick="switchTab('resources')">🧱 Ресурсы</button>
            </div>
            <div id="sidebarContent" style="display: flex; flex-direction: column; flex:1;"></div>
            <div class="sidebar-footer">
                <button class="btn-io btn-export" onclick="exportData()">📤 Экспорт</button>
                <button class="btn-io btn-import" onclick="importData()">📥 Импорт</button>
            </div>
        </div>
        <div class="main-panel" id="mainPanel">
            <div class="empty-state">
                <h2>📊 Albion Profit Tracker v6</h2>
                <p>Выберите город вверху слева, чтобы начать анализ.</p>
            </div>
        </div>
    </div>

    <datalist id="resourcesDataList"></datalist>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/tabs/dashboard.js"></script>
    <script src="js/tabs/items.js"></script>
    <script src="js/tabs/lots.js"></script>
    <script src="js/tabs/resources.js"></script>
    <script src="js/exportImport.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
